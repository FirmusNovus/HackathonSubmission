services:
  postgres:
    image: postgres:16-alpine
    container_name: firmus_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: firmus
      POSTGRES_PASSWORD: firmus
      POSTGRES_DB: firmus_novus
    ports:
      - "5434:5432"
    volumes:
      - firmus_pg_data:/var/lib/postgresql/data

volumes:
  firmus_pg_data:
